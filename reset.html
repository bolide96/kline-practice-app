<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>更新 K 線練習室</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef4ff;
    font-family:"Microsoft JhengHei",system-ui,sans-serif;color:#172033}
    .box{max-width:520px;margin:20px;background:white;border:1px solid #dbe3ef;
    border-radius:20px;padding:28px;box-shadow:0 12px 30px rgba(15,23,42,.1);text-align:center}
    h1{color:#12356b}.spin{font-size:52px}p{line-height:1.7;color:#667085}
  </style>
</head>
<body>
  <div class="box">
    <div class="spin">🔄</div>
    <h1>正在清除舊版本</h1>
    <p>完成後會自動開啟 K 線練習室最新版。</p>
  </div>
<script>
(async () => {
  try {
    if ('serviceWorker' in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(reg => reg.unregister()));
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(key => caches.delete(key)));
    }
  } catch (error) {
    console.warn(error);
  }
  location.replace('./?updated=v3&t=' + Date.now());
})();
</script>
</body>
</html>
